<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Você está offline - Clean Energy</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/imagem/icon-192.png">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f4f6f5;
      color: #1a1a1a;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
    }
    img.logo {
      width: 88px;
      height: 88px;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.4rem; margin: 0 0 8px; color: #1b814e; }
    p { margin: 0 0 20px; color: #555; line-height: 1.5; }
    button {
      background: #1b814e;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
    .dica { margin-top: 28px; font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>
  <section class="card">
    <img class="logo" src="/imagem/icon-192.png" alt="Clean Energy">
    <h1>Sem conexão com a internet</h1>
    <p>Não foi possível carregar esta página porque você está offline e ela ainda não tinha sido salva no seu dispositivo. Verifique sua conexão e tente novamente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
    <p class="dica">Páginas que você já visitou continuam disponíveis offline.</p>
  </section>
</body>
</html>
